services:
  - type: web
    name: librarymanagementsystem
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://librarymanagementsystem-a6r5.onrender.com
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_DOMAIN
        value: null
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_FROM_ADDRESS
        value: your_verified_from_address@example.com
      - key: MAIL_FROM_NAME
        value: CCLMS Library
