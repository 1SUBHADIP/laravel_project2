services:
  - type: web
    name: librarymanagementsystem
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://librarymanagementsystem-a6r5.onrender.com
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: dpg-d7mr160g4nts73aqaf60-a
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: library_db_8b3y
      - key: DB_USERNAME
        value: library_db_8b3y_user
      - key: DB_PASSWORD
        value: dP1rCQz7SsQ3RJM4sGnKrfKwdh9VIarf
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
    disks:
      - name: library-data
        mountPath: /var/data
        sizeGB: 1